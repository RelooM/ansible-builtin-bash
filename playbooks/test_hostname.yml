---
# Test playbook for bash.hostname — sets a test hostname (current + "-test"),
# checks idempotency, then restores the original hostname in a block/always.
# The module is JSON-driven: we ship library/ to the target and invoke the
# script directly with ARGS_JSON exported.
#
# Usage:
#   ansible-playbook -i inventory playbooks/test_hostname.yml --module-path library
- hosts: all
  gather_facts: true
  vars:
    moddir: /tmp/bashmods
  tasks:
    - name: Ship library/ to target
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../library/"
        dest: "{{ moddir }}/"
        mode: "0755"
      become: false

    - name: Capture current hostname
      ansible.builtin.command: hostname
      register: hn_cur
      changed_when: false

    - name: SET FACT hn_orig and hn_test
      ansible.builtin.set_fact:
        hn_orig: "{{ hn_cur.stdout | trim }}"
        hn_test: "{{ (hn_cur.stdout | trim).split('.')[0] }}-test"

    - name: bash.hostname — set test hostname (run1, expect changed)
      ansible.builtin.command: /tmp/bashmods/bash.hostname.sh
      environment:
        ARGS_JSON: '{"name": "{{ hn_test }}", "use_sudo": "auto"}'
      register: hn_r1

    - name: bash.hostname — set test hostname (idempotent)
      ansible.builtin.command: /tmp/bashmods/bash.hostname.sh
      environment:
        ARGS_JSON: '{"name": "{{ hn_test }}", "use_sudo": "auto"}'
      register: hn_r2

    - name: ASSERT — set changed first, idempotent after
      ansible.builtin.assert:
        that:
          - hn_r1.rc == 0 and (hn_r1.stdout | from_json).changed | bool
          - hn_r2.rc == 0 and not ((hn_r2.stdout | from_json).changed | bool)
        fail_msg: "bash.hostname test failed"

    - name: CLEANUP — restore original hostname (always)
      ansible.builtin.command: /tmp/bashmods/bash.hostname.sh
      environment:
        ARGS_JSON: '{"name": "{{ hn_orig }}", "use_sudo": "auto"}'
      failed_when: false

    - name: CLEANUP — remove shipped module dir (always)
      ansible.builtin.file:
        path: "{{ moddir }}"
        state: absent
      failed_when: false
