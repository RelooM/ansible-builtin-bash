---
# Test playbook for bash.dnf — covers install (single + multiple), latest,
# idempotency, absent + idempotent absent, update_cache, and autoremove.
# Self-reverts: removes all installed test packages + runs autoremove at the end.
#
# Usage:
#   ansible-playbook -i inventory playbooks/test_dnf.yml --module-path library --limit redhat
# No `become:` needed — the module escalates via internal sudo -n.
- hosts: redhat
  gather_facts: true
  vars:
    test_pkgs: [curl, wget]   # small, ubiquitous on dnf systems
  tasks:
    - name: bash.dnf — install {{ test_pkgs[0] }} (run1, expect changed)
      bash.dnf:
        name: "{{ test_pkgs[0] }}"
        state: present
      register: dnf_r1

    - name: bash.dnf — install {{ test_pkgs[0] }} (idempotent)
      bash.dnf:
        name: "{{ test_pkgs[0] }}"
        state: present
      register: dnf_r2

    - name: bash.dnf — install multiple {{ test_pkgs | join(', ') }}
      bash.dnf:
        name: "{{ test_pkgs }}"
        state: present
      register: dnf_multi

    - name: bash.dnf — update {{ test_pkgs[0] }} to latest
      bash.dnf:
        name: "{{ test_pkgs[0] }}"
        state: latest
      register: dnf_latest

    - name: bash.dnf — update_cache only (no-op transaction)
      bash.dnf:
        name: "{{ test_pkgs[0] }}"
        state: present
        update_cache: true
      register: dnf_cache

    - name: bash.dnf — autoremove leaf dependencies
      bash.dnf:
        autoremove: true
      register: dnf_autoremove

    - name: bash.dnf — remove {{ test_pkgs[1] }} (run1, expect changed)
      bash.dnf:
        name: "{{ test_pkgs[1] }}"
        state: absent
      register: dnf_wget_rm

    - name: bash.dnf — remove {{ test_pkgs[1] }} (idempotent)
      bash.dnf:
        name: "{{ test_pkgs[1] }}"
        state: absent
      register: dnf_wget_rm2

    - name: ASSERT — changed on first install, idempotent on re-run, no failures
      ansible.builtin.assert:
        that:
          - dnf_r1 is changed and dnf_r1 is success
          - dnf_r2 is not changed and dnf_r2 is success
          - dnf_multi is changed and dnf_multi is success
          - dnf_cache is success
          - dnf_autoremove is success
          - dnf_wget_rm is changed and dnf_wget_rm is success
          - dnf_wget_rm2 is not changed and dnf_wget_rm2 is success
        fail_msg: "bash.dnf test failed — see registered results above"

  post_tasks:
    - name: CLEANUP — remove test packages
      bash.dnf:
        name: "{{ test_pkgs }}"
        state: absent
      failed_when: false

    - name: CLEANUP — autoremove
      bash.dnf:
        autoremove: true
      failed_when: false
